# Home Assistant Lovelace card
# Native dashboard card stack for Luna (no iframe)

type: vertical-stack
cards:
  - type: markdown
    content: |
      ## Luna Tracker
      Quick cycle summary from Home Assistant sensors.

  - type: markdown
    content: |
      {% set month = states('sensor.period_tracker_calendar_data') %}
      {% set weeks = state_attr('sensor.period_tracker_calendar_data', 'weeks') or [] %}
      ### {{ month if month not in ['unknown', 'unavailable', 'none', ''] else 'Luna Calendar' }}
      {% if weeks | count == 0 %}
      Calendar data is not available yet. Reload the REST entities or restart Home Assistant after adding the new `sensor.period_tracker_calendar_data` sensor.
      {% else %}
      ```text
      Su    Mo    Tu    We    Th    Fr    Sa
      {% for week in weeks %}
      {% for cell in week %}{% if cell.in_month %}{{ '%2s' | format(cell.label) }}{{ 'T' if cell.is_today else ' ' }}{{ 'P' if cell.is_period else ('*' if cell.is_predicted else ' ') }}{{ 'S' if cell.symptom_count > 0 else ' ' }}{{ 'M' if cell.has_mood else ' ' }} {% else %}      {% endif %}{% endfor %}
      {% endfor %}
      ```

      Legend: `P` Period, `*` Predicted, `S` Symptom logged, `M` Mood logged, `T` Today
      {% endif %}

  - type: glance
    title: Today's Snapshot
    columns: 3
    show_state: true
    entities:
      - entity: sensor.period_tracker_days_since_period
        name: Since Start
      - entity: sensor.days_until_next_period
        name: Next In
      - entity: sensor.period_phase
        name: Phase
      - entity: sensor.period_tracker_today_mood
        name: Mood
      - entity: sensor.period_tracker_today_symptoms
        name: Symptoms
      - entity: binary_sensor.period_active
        name: Active

  - type: entities
    title: Cycle Details
    show_header_toggle: false
    entities:
      - entity: sensor.period_tracker_next_period_date
        name: Next predicted period
      - entity: sensor.period_tracker_avg_cycle_length
        name: Average cycle length
      - entity: sensor.period_tracker_days_since_period
        name: Days since period started
      - entity: sensor.days_until_next_period
        name: Days until next period
      - entity: sensor.period_phase
        name: Current phase
      - entity: sensor.period_tracker_today_mood
        name: Today's mood
      - entity: sensor.period_tracker_today_symptoms
        name: Today's symptoms
      - entity: input_text.period_tracker_last_event
        name: Last webhook event

  - type: conditional
    conditions:
      - entity: binary_sensor.period_active
        state: "on"
    card:
      type: markdown
      content: |
        ### Period Active
        Period tracking is currently marked as active.

  - type: button
    name: Open Full Luna App
    icon: mdi:open-in-new
    tap_action:
      action: url
      url_path: https://pt.3evils.com
    show_state: false
